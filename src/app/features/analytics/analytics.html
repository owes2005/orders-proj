<div class="analytics">
  <header class="page-header">
    <h1>Analytics</h1>
    <p class="subtitle">Daily performance and revenue metrics</p>
  </header>
  <main class="analytics-content">
    <app-dashboard-stats
      [todaysOrdersCount]="ordersService.todaysOrders().length"
      [todaysRevenue]="ordersService.todaysRevenue()"
      [topOrders]="ordersService.topOrdersOfDay()"
    />
        <!-- DYNAMIC ORDERS TABLE -->
        <mat-card class="section-card">
  <mat-card-header>
    <mat-card-title class="section-title">
      Today's Orders
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <app-orders-table
      [orders]="ordersService.todaysOrders()">
    </app-orders-table>
  </mat-card-content>

</mat-card>

  </main>
</div>
